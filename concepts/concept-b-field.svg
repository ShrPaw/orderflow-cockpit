<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#0a0e14"/>
  
  <!-- Liquidity Field mark -->
  <g transform="translate(155, 200)">
    <!-- Field lines curving around invisible center of gravity -->
    <!-- Outer layer - farthest from center, most bent -->
    <path d="M -90,-80 Q -30,-60 0,-25 Q 30,-60 90,-80" fill="none" stroke="#0d4f6e" stroke-width="1" opacity="0.3"/>
    <path d="M -90,80 Q -30,60 0,25 Q 30,60 90,80" fill="none" stroke="#0d4f6e" stroke-width="1" opacity="0.3"/>
    
    <!-- Mid layer -->
    <path d="M -80,-55 Q -20,-40 0,-15 Q 20,-40 80,-55" fill="none" stroke="#0e6a8a" stroke-width="1.4" opacity="0.45"/>
    <path d="M -80,55 Q -20,40 0,15 Q 20,40 80,55" fill="none" stroke="#0e6a8a" stroke-width="1.4" opacity="0.45"/>
    
    <!-- Inner layer -->
    <path d="M -60,-32 Q -15,-22 0,-8 Q 15,-22 60,-32" fill="none" stroke="#00b8c4" stroke-width="1.8" opacity="0.65"/>
    <path d="M -60,32 Q -15,22 0,8 Q 15,22 60,32" fill="none" stroke="#00b8c4" stroke-width="1.8" opacity="0.65"/>
    
    <!-- Core field convergence -->
    <path d="M -35,-14 Q -8,-10 0,-3 Q 8,-10 35,-14" fill="none" stroke="#00e8dc" stroke-width="2.2" opacity="0.85"/>
    <path d="M -35,14 Q -8,10 0,3 Q 8,10 35,14" fill="none" stroke="#00e8dc" stroke-width="2.2" opacity="0.85"/>
    
    <!-- Density nodes along the field -->
    <circle cx="-55" cy="-28" r="2" fill="#00c8d0" opacity="0.5"/>
    <circle cx="55" cy="28" r="2" fill="#00c8d0" opacity="0.5"/>
    <circle cx="-30" cy="-16" r="2.5" fill="#00dce8" opacity="0.65"/>
    <circle cx="30" cy="16" r="2.5" fill="#00dce8" opacity="0.65"/>
    
    <!-- Central gravity point - the invisible center -->
    <ellipse cx="0" cy="0" rx="4" ry="4" fill="#00f5ec" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="12" ry="12" fill="none" stroke="#00f5ec" stroke-width="0.6" opacity="0.3"/>
    
    <!-- Vertical pressure axis (subtle) -->
    <line x1="0" y1="-95" x2="0" y2="95" stroke="#0d4f6e" stroke-width="0.4" opacity="0.15" stroke-dasharray="3,8"/>
    
    <!-- Horizontal pressure axis (subtle) -->
    <line x1="-100" y1="0" x2="100" y2="0" stroke="#0d4f6e" stroke-width="0.4" opacity="0.15" stroke-dasharray="3,8"/>
  </g>
  
  <!-- Wordmark -->
  <text x="330" y="190" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="38" font-weight="300" letter-spacing="8" fill="#e8edf2">ORDERFLOW</text>
  <text x="330" y="228" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="24" font-weight="200" letter-spacing="14" fill="#5a6a7a">COCKPIT</text>
  
  <line x1="330" y1="200" x2="570" y2="200" stroke="#1a2a3a" stroke-width="0.5"/>
</svg>