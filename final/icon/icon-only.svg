<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0a0e14"/>
  
  <g transform="translate(100, 100)">
    <!-- Outermost arc -->
    <path d="M 0,-78 A 78,78 0 0,1 67.5,39" fill="none" stroke="#00d4c8" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
    <path d="M 0,78 A 78,78 0 0,1 -67.5,-39" fill="none" stroke="#00d4c8" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
    
    <!-- Second arc -->
    <path d="M 0,-58 A 58,58 0 0,1 50,29" fill="none" stroke="#00e4d8" stroke-width="1.4" opacity="0.28" stroke-linecap="round"/>
    <path d="M 0,58 A 58,58 0 0,1 -50,-29" fill="none" stroke="#00e4d8" stroke-width="1.4" opacity="0.28" stroke-linecap="round"/>
    
    <!-- Third arc -->
    <path d="M 0,-40 A 40,40 0 0,1 34.6,20" fill="none" stroke="#00f0e8" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>
    <path d="M 0,40 A 40,40 0 0,1 -34.6,-20" fill="none" stroke="#00f0e8" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>
    
    <!-- Inner arc -->
    <path d="M 0,-24 A 24,24 0 0,1 20.8,12" fill="none" stroke="#00f5ec" stroke-width="2" opacity="0.75" stroke-linecap="round"/>
    <path d="M 0,24 A 24,24 0 0,1 -20.8,-12" fill="none" stroke="#00f5ec" stroke-width="2" opacity="0.75" stroke-linecap="round"/>
    
    <!-- Core ring -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#00f5ec" stroke-width="1.6" opacity="0.85"/>
    
    <!-- Center point -->
    <circle cx="0" cy="0" r="3.5" fill="#00f5ec" opacity="0.95"/>
    <circle cx="0" cy="0" r="6" fill="#00f5ec" opacity="0.1"/>
    
    <!-- Detection beam -->
    <line x1="0" y1="0" x2="85" y2="-9" stroke="#00f5ec" stroke-width="0.6" opacity="0.2" stroke-dasharray="2,5"/>
    
    <!-- Liquidity points -->
    <circle cx="62" cy="-22" r="1.8" fill="#00f5ec" opacity="0.5"/>
    <circle cx="74" cy="12" r="1.3" fill="#00f5ec" opacity="0.35"/>
    <circle cx="52" cy="36" r="1.5" fill="#00f5ec" opacity="0.4"/>
  </g>
</svg>