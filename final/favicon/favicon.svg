<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Favicon: simplified sonar mark for small sizes -->
  <rect width="64" height="64" rx="12" fill="#0a0e14"/>
  
  <g transform="translate(32, 32)">
    <!-- Simplified arcs - fewer, bolder for small size -->
    <path d="M 0,-24 A 24,24 0 0,1 20.8,12" fill="none" stroke="#00d4c8" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
    <path d="M 0,24 A 24,24 0 0,1 -20.8,-12" fill="none" stroke="#00d4c8" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
    
    <path d="M 0,-17 A 17,17 0 0,1 14.7,8.5" fill="none" stroke="#00f0e8" stroke-width="2" opacity="0.45" stroke-linecap="round"/>
    <path d="M 0,17 A 17,17 0 0,1 -14.7,-8.5" fill="none" stroke="#00f0e8" stroke-width="2" opacity="0.45" stroke-linecap="round"/>
    
    <path d="M 0,-11 A 11,11 0 0,1 9.5,5.5" fill="none" stroke="#00f5ec" stroke-width="2.5" opacity="0.75" stroke-linecap="round"/>
    <path d="M 0,11 A 11,11 0 0,1 -9.5,-5.5" fill="none" stroke="#00f5ec" stroke-width="2.5" opacity="0.75" stroke-linecap="round"/>
    
    <!-- Core -->
    <circle cx="0" cy="0" r="5" fill="none" stroke="#00f5ec" stroke-width="2" opacity="0.85"/>
    <circle cx="0" cy="0" r="2" fill="#00f5ec" opacity="0.95"/>
    
    <!-- Detection point -->
    <circle cx="18" cy="-7" r="1.5" fill="#00f5ec" opacity="0.5"/>
  </g>
</svg>