<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Liquidity Field — icon-only mark, compact -->
  <g transform="translate(24, 24)">
    <!-- Layer 1: outer field lines -->
    <path d="M -20,-15 Q -5,-11 0,-4 Q 5,-11 20,-15" fill="none" stroke="#0d4f6e" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
    <path d="M -20,15 Q -5,11 0,4 Q 5,11 20,15" fill="none" stroke="#0d4f6e" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
    <!-- Layer 2: mid field -->
    <path d="M -16,-10 Q -4,-7.5 0,-2.8 Q 4,-7.5 16,-10" fill="none" stroke="#00b8c4" stroke-width="1.4" opacity="0.45" stroke-linecap="round"/>
    <path d="M -16,10 Q -4,7.5 0,2.8 Q 4,7.5 16,10" fill="none" stroke="#00b8c4" stroke-width="1.4" opacity="0.45" stroke-linecap="round"/>
    <!-- Layer 3: inner field -->
    <path d="M -10,-5.5 Q -3,-4 0,-1.5 Q 3,-4 10,-5.5" fill="none" stroke="#00e8dc" stroke-width="1.8" opacity="0.75" stroke-linecap="round"/>
    <path d="M -10,5.5 Q -3,4 0,1.5 Q 3,4 10,5.5" fill="none" stroke="#00e8dc" stroke-width="1.8" opacity="0.75" stroke-linecap="round"/>
    <!-- Density nodes -->
    <circle cx="-13" cy="-8" r="1.3" fill="#00c8d0" opacity="0.5"/>
    <circle cx="13" cy="8" r="1.3" fill="#00c8d0" opacity="0.5"/>
    <!-- Core gravity -->
    <circle cx="0" cy="0" r="2.5" fill="#00f5ec" opacity="0.9"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#00f5ec" stroke-width="0.5" opacity="0.2"/>
  </g>
</svg>